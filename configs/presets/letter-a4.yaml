# letter-a4 — formal A4 letter.
# 10 mm lines with slight leading, subtle organic jitter, auto-kerning.
paper_size: A4
orientation: portrait
margin: 25
line_height_mm: 10
line_spacing: 1.3
wrap_mode: balanced
stroke_width: 0.4
space_width_mm: 2.8
space_jitter_mm: 0.3
line_drift_angle: 0.2
line_drift_y: 0.25
glyph_slant_jitter: 0.5
glyph_y_jitter: 0.1
auto_kern: true
kern_aggressiveness: 0.5
