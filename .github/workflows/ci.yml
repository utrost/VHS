name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run unit tests (Typesetter / Renderer / helpers)
        working-directory: assembler
        run: python -m unittest test_assembler -v

      - name: Run CLI tests (flags, presets, pagination, reports)
        working-directory: assembler
        run: python -m unittest test_cli -v

      - name: Run smoke test (generate SVG from test font)
        working-directory: assembler
        run: |
          python assembler.py "Hi" /tmp/smoke_test.svg --font font1
          test -s /tmp/smoke_test.svg && echo "SVG generated" || exit 1

      - name: Run smoke test (mm layout with paper size)
        working-directory: assembler
        run: |
          python assembler.py "Hi" /tmp/smoke_a5.svg \
            --font font1 --paper-size A5 --margin 10 \
            --line-height-mm 10 --stroke-width 0.4
          test -s /tmp/smoke_a5.svg && echo "mm-layout SVG generated" || exit 1

      - name: Run smoke test (--preset + --report)
        working-directory: assembler
        run: |
          python assembler.py "Hi" /tmp/smoke_report.svg \
            --preset letter-a4 --font font1 --report
