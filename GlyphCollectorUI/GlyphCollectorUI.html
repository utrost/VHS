<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VHS — Glyph Collector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Disable touch actions to prevent scrolling while drawing */
        body {
            touch-action: none;
            overscroll-behavior: none;
        }

        .canvas-slot {
            touch-action: none;
            cursor: crosshair;
            background-color: white;
            transition: border-color 0.2s;
        }

        .canvas-slot:active {
            border-color: #3b82f6;
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-slate-100 h-screen w-screen flex flex-col overflow-hidden font-sans text-slate-800">

    <!-- Header & Controls -->
    <header
        class="flex-none p-4 bg-white border-b border-slate-200 shadow-sm z-10 flex flex-wrap gap-4 items-end justify-between">
        <div>
            <h1 class="text-xl font-bold text-slate-900 leading-tight">VHS Batch Collector</h1>
            <p class="text-xs text-slate-500">Zeichne Varianten. Enter zum Speichern. · <a href="https://simiono.com/VHS" class="text-blue-500 hover:text-blue-700 transition">by simiono</a></p>
        </div>

        <div class="flex gap-4 items-end">
            <button onclick="toggleSettings()"
                class="px-3 h-12 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg border border-slate-300 transition"
                title="Einstellungen">
                ⚙️
            </button>
            <div>
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Zeichen</label>
                <input type="text" id="charInput" placeholder="a" autofocus
                    class="w-24 text-center text-2xl font-mono p-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:ring-0 outline-none transition placeholder-slate-200">
            </div>

            <button onclick="saveAndReset()"
                class="h-12 px-6 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow-md active:transform active:scale-95 transition flex items-center gap-2">
                <span>Save JSON</span>
                <span class="text-xs opacity-75 font-normal">(Enter)</span>
            </button>

            <button onclick="undo()"
                class="h-12 px-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-lg transition"
                title="Rückgängig (Ctrl+Z)">
                Undo
            </button>
            <button onclick="redo()"
                class="h-12 px-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-lg transition"
                title="Wiederherstellen (Ctrl+Shift+Z)">
                Redo
            </button>

            <button id="smoothToggle" onclick="toggleSmooth()"
                class="h-12 px-3 bg-green-100 hover:bg-green-200 text-green-700 font-medium rounded-lg transition"
                title="Glättungsvorschau ein/aus">
                Smooth ✓
            </button>

            <button onclick="clearAll()"
                class="h-12 px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-lg transition">
                Reset
            </button>
        </div>
    </header>

    <!-- Settings Panel (Hidden by default) -->
    <div id="settingsPanel"
        class="hidden absolute top-20 right-4 bg-white p-6 rounded-xl shadow-2xl border border-slate-200 z-50 w-80">
        <h3 class="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Einstellungen</h3>

        <div class="space-y-4">
            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Font Name</label>
                <input type="text" id="cfgFontFamily" class="w-32 p-1 border rounded text-right text-xs"
                    value="MyHandwriting">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Anzahl Varianten</label>
                <input type="number" id="cfgCount" class="w-20 p-1 border rounded text-right" value="10">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Breite (px)</label>
                <input type="number" id="cfgWidth" class="w-20 p-1 border rounded text-right" value="100">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Höhe (px)</label>
                <input type="number" id="cfgHeight" class="w-20 p-1 border rounded text-right" value="140">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Baseline Y</label>
                <input type="number" id="cfgBaseline" class="w-20 p-1 border rounded text-right" value="100">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">x-Height Y</label>
                <input type="number" id="cfgXHeight" class="w-20 p-1 border rounded text-right" value="60">
            </div>

            <div class="flex justify-between items-center">
                <label class="text-sm font-bold text-slate-600">Anzeige-Zoom</label>
                <input type="number" id="cfgDisplayScale" class="w-20 p-1 border rounded text-right" value="3" min="1" max="5" step="1">
            </div>

            <div class="pt-4 border-t mt-4">
                <button onclick="applySettings()"
                    class="w-full bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded-lg transition text-sm">
                    Anwenden & Reset
                </button>
                <p class="text-[10px] text-center text-slate-400 mt-2">Achtung: Löscht aktuelle Zeichnung!</p>
            </div>
        </div>
    </div>


    <!-- Drawing Area (Horizontal Scroll) -->
    <main class="flex-1 overflow-x-auto overflow-y-hidden p-4 flex items-center bg-slate-50 no-scrollbar">
        <div class="flex gap-4 px-4 m-auto">
            <!-- Slots injected here -->
            <div id="canvasContainer" class="flex gap-4"></div>
        </div>
    </main>

    <!-- Footer Status -->
    <footer class="flex-none bg-white border-t border-slate-200 p-2 px-4 text-xs text-slate-400 flex justify-between">
        <span id="status">Bereit zum Zeichnen</span>
        <div class="flex gap-4">
            <span>Druck: <b id="pressureVal" class="text-slate-700">0.00</b></span>
            <span>Striche: <b id="strokeCount" class="text-slate-700">0</b></span>
        </div>
    </footer>

    <script>
        // --- Configuration (Defaults) ---
        let FONT_FAMILY = "MyHandwriting";
        let VARIANT_COUNT = 10;
        let CANVAS_WIDTH = 100;
        let CANVAS_HEIGHT = 140;
        let BASELINE_Y = 100;    // Red line
        let X_HEIGHT = 60;      // Blue dashed line
        let DISPLAY_SCALE = 3;  // CSS display multiplier (canvas coords stay unchanged)

        // --- State ---
        let slots = [];
        let lastActiveSlot = null; // Track which slot was last drawn on

        // --- Initialization ---
        function init() {
            // Try to restore a previous session from localStorage
            if (!autoRestore()) {
                generateGrid();
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') saveAndReset();
                if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
                    e.preventDefault();
                    undo();
                }
                if ((e.metaKey || e.ctrlKey) && e.key === 'z' && e.shiftKey) {
                    e.preventDefault();
                    redo();
                }
            });

            // Auto-save when character input changes
            document.getElementById('charInput').addEventListener('input', autoSave);
        }

        function toggleSettings() {
            const el = document.getElementById('settingsPanel');
            el.classList.toggle('hidden');
        }

        function applySettings() {
            const fontName = document.getElementById('cfgFontFamily').value;
            const count = parseInt(document.getElementById('cfgCount').value);
            const w = parseInt(document.getElementById('cfgWidth').value);
            const h = parseInt(document.getElementById('cfgHeight').value);
            const base = parseInt(document.getElementById('cfgBaseline').value);
            const xh = parseInt(document.getElementById('cfgXHeight').value);
            const ds = parseInt(document.getElementById('cfgDisplayScale').value) || 3;

            if (fontName && count && w && h && base && xh) {
                FONT_FAMILY = fontName;
                VARIANT_COUNT = count;
                CANVAS_WIDTH = w;
                CANVAS_HEIGHT = h;
                BASELINE_Y = base;
                X_HEIGHT = xh;
                DISPLAY_SCALE = Math.max(1, Math.min(5, ds));
                generateGrid();
                toggleSettings();
            } else {
                alert("Bitte gültige Daten eingeben!");
            }
        }

        function generateGrid() {
            const container = document.getElementById('canvasContainer');
            container.innerHTML = ''; // Clear existing
            slots = []; // Reset state

            for (let i = 0; i < VARIANT_COUNT; i++) {
                const wrapper = document.createElement('div');
                wrapper.className = 'relative group';

                const canvas = document.createElement('canvas');
                canvas.width = CANVAS_WIDTH;
                canvas.height = CANVAS_HEIGHT;
                canvas.className = 'canvas-slot rounded-lg shadow-sm border-2 border-white';
                canvas.id = `slot-${i}`;
                // Set explicit style size to ensure CSS respects it if needed, 
                // though width/height attrs should suffice for raw pixels.
                canvas.style.width = `${CANVAS_WIDTH * DISPLAY_SCALE}px`;
                canvas.style.height = `${CANVAS_HEIGHT * DISPLAY_SCALE}px`;


                const label = document.createElement('div');
                label.className = 'absolute top-2 left-2 text-xs font-bold text-slate-300 select-none pointer-events-none group-hover:text-slate-400';
                label.innerText = `#${i + 1}`;

                wrapper.appendChild(canvas);
                wrapper.appendChild(label);
                container.appendChild(wrapper);

                const ctx = canvas.getContext('2d', { desynchronized: true });
                const slotData = {
                    id: i,
                    canvas,
                    ctx,
                    strokes: [],
                    undoStack: [],
                    currentStroke: null
                };

                slots.push(slotData);
                attachEvents(slotData);
                drawGuides(slotData);
            }
            updateTotalCount();
        }

        // --- Drawing Logic ---
        function attachEvents(slot) {
            const { canvas } = slot;

            canvas.addEventListener('pointerdown', (e) => {
                canvas.setPointerCapture(e.pointerId);
                slot.currentStroke = [];
                slot.strokes.push(slot.currentStroke);
                slot.undoStack = []; // New stroke clears redo history
                lastActiveSlot = slot;
                addPoint(e, slot);
                document.getElementById('status').innerText = `Zeichne Variante ${slot.id + 1}...`;
            });

            canvas.addEventListener('pointermove', (e) => {
                if (!slot.currentStroke) return;
                if (e.getCoalescedEvents) {
                    e.getCoalescedEvents().forEach(ce => addPoint(ce, slot));
                } else {
                    addPoint(e, slot);
                }
                redraw(slot);
            });

            canvas.addEventListener('pointerup', (e) => {
                slot.currentStroke = null;
                document.getElementById('status').innerText = "Bereit";
                updateTotalCount();
                autoSave();
            });

            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        function addPoint(e, slot) {
            const rect = slot.canvas.getBoundingClientRect();
            // Since we resize canvas now, verify scale calcs
            const scaleX = slot.canvas.width / rect.width;
            const scaleY = slot.canvas.height / rect.height;

            const point = {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY,
                p: e.pressure || 0.5,
                t: Date.now()
            };

            slot.currentStroke.push(point);
            document.getElementById('pressureVal').innerText = point.p.toFixed(3);
        }

        function drawGuides(slot) {
            const { ctx, canvas } = slot;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Baseline (Red)
            ctx.beginPath();
            ctx.strokeStyle = '#fca5a5';
            ctx.lineWidth = 2;
            ctx.moveTo(0, BASELINE_Y);
            ctx.lineTo(canvas.width, BASELINE_Y);
            ctx.stroke();

            // x-Height (Blue Dashed)
            ctx.beginPath();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#bfdbfe';
            ctx.lineWidth = 1;
            ctx.moveTo(0, X_HEIGHT);
            ctx.lineTo(canvas.width, X_HEIGHT);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // --- Smooth Preview ---
        let SMOOTH_PREVIEW = true;

        function catmullRomPoints(stroke) {
            // Generate smoothed points using Catmull-Rom interpolation
            // (visual preview only — raw data is preserved for export)
            if (stroke.length < 3) return stroke;
            const result = [stroke[0]];
            for (let i = 0; i < stroke.length - 1; i++) {
                const p0 = stroke[Math.max(0, i - 1)];
                const p1 = stroke[i];
                const p2 = stroke[Math.min(stroke.length - 1, i + 1)];
                const p3 = stroke[Math.min(stroke.length - 1, i + 2)];
                const segLen = Math.hypot(p2.x - p1.x, p2.y - p1.y);
                const steps = Math.max(2, Math.min(8, Math.floor(segLen / 3)));
                for (let s = 1; s <= steps; s++) {
                    const t = s / steps;
                    const t2 = t * t, t3 = t2 * t;
                    const x = 0.5 * ((2 * p1.x) +
                        (-p0.x + p2.x) * t +
                        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
                        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
                    const y = 0.5 * ((2 * p1.y) +
                        (-p0.y + p2.y) * t +
                        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
                        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
                    const p = p1.p + (p2.p - p1.p) * t; // Interpolate pressure
                    result.push({ x, y, p });
                }
            }
            return result;
        }

        function redraw(slot) {
            drawGuides(slot);
            const { ctx, strokes } = slot;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            strokes.forEach(stroke => {
                if (stroke.length === 0) return;
                // Render single-point strokes as dots (for commas, periods, etc.)
                if (stroke.length === 1) {
                    const pt = stroke[0];
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 1 + (pt.p * 1.25), 0, Math.PI * 2);
                    ctx.fillStyle = '#0f172a';
                    ctx.fill();
                    return;
                }
                const pts = SMOOTH_PREVIEW ? catmullRomPoints(stroke) : stroke;
                for (let i = 1; i < pts.length; i++) {
                    const p1 = pts[i - 1];
                    const p2 = pts[i];
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    // Pressure viz
                    ctx.lineWidth = 1 + (p2.p * 2.5);
                    ctx.strokeStyle = '#0f172a';
                    ctx.stroke();
                }
            });
        }

        function updateTotalCount() {
            const total = slots.reduce((acc, s) => acc + s.strokes.length, 0);
            document.getElementById('strokeCount').innerText = total;
        }

        function undo() {
            if (!lastActiveSlot || lastActiveSlot.strokes.length === 0) return;
            const removed = lastActiveSlot.strokes.pop();
            lastActiveSlot.undoStack.push(removed);
            redraw(lastActiveSlot);
            updateTotalCount();
            autoSave();
            document.getElementById('status').innerText =
                `Rückgängig (Variante ${lastActiveSlot.id + 1})`;
        }

        function redo() {
            if (!lastActiveSlot || lastActiveSlot.undoStack.length === 0) return;
            const restored = lastActiveSlot.undoStack.pop();
            lastActiveSlot.strokes.push(restored);
            redraw(lastActiveSlot);
            updateTotalCount();
            autoSave();
            document.getElementById('status').innerText =
                `Wiederherstellen (Variante ${lastActiveSlot.id + 1})`;
        }

        function toggleSmooth() {
            SMOOTH_PREVIEW = !SMOOTH_PREVIEW;
            const btn = document.getElementById('smoothToggle');
            if (SMOOTH_PREVIEW) {
                btn.textContent = 'Smooth ✓';
                btn.className = 'h-12 px-3 bg-green-100 hover:bg-green-200 text-green-700 font-medium rounded-lg transition';
            } else {
                btn.textContent = 'Smooth ✗';
                btn.className = 'h-12 px-3 bg-slate-100 hover:bg-slate-200 text-slate-500 font-medium rounded-lg transition';
            }
            // Redraw all slots with new setting
            slots.forEach(redraw);
        }

        function clearAll() {
            slots.forEach(slot => {
                slot.strokes = [];
                slot.undoStack = [];
                slot.currentStroke = null;
                drawGuides(slot);
            });
            lastActiveSlot = null;
            updateTotalCount();
            clearAutoSave();
            document.getElementById('charInput').focus();
        }

        // --- File Naming & Sanitization ---
        function getSafeFilename(inputName) {
            // Convert to Unicode Hex (e.g., 'A' -> '0041', 'a' -> '0061')
            // This ensures uniqueness (case-sensitive) on Windows and handles all special chars.
            return inputName.split('')
                .map(c => c.charCodeAt(0).toString(16).toUpperCase().padStart(4, '0'))
                .join('');
        }

        // --- Auto-Save (localStorage) ---
        const STORAGE_KEY = 'vhs_glyph_session';

        function autoSave() {
            try {
                const charInput = document.getElementById('charInput').value;
                const sessionData = {
                    char: charInput,
                    config: { FONT_FAMILY, VARIANT_COUNT, CANVAS_WIDTH, CANVAS_HEIGHT, BASELINE_Y, X_HEIGHT, DISPLAY_SCALE },
                    slots: slots.map(s => ({ id: s.id, strokes: s.strokes }))
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(sessionData));
            } catch (e) {
                // localStorage may be full or unavailable — fail silently
            }
        }

        function autoRestore() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return false;
                const data = JSON.parse(raw);
                if (!data || !data.slots) return false;

                // Restore config if it matches current grid size
                if (data.config) {
                    FONT_FAMILY = data.config.FONT_FAMILY || FONT_FAMILY;
                    VARIANT_COUNT = data.config.VARIANT_COUNT || VARIANT_COUNT;
                    CANVAS_WIDTH = data.config.CANVAS_WIDTH || CANVAS_WIDTH;
                    CANVAS_HEIGHT = data.config.CANVAS_HEIGHT || CANVAS_HEIGHT;
                    BASELINE_Y = data.config.BASELINE_Y || BASELINE_Y;
                    X_HEIGHT = data.config.X_HEIGHT || X_HEIGHT;
                    DISPLAY_SCALE = data.config.DISPLAY_SCALE || DISPLAY_SCALE;
                }

                // Rebuild grid with restored config
                generateGrid();

                // Restore strokes into slots
                for (const saved of data.slots) {
                    if (saved.id < slots.length && saved.strokes && saved.strokes.length > 0) {
                        slots[saved.id].strokes = saved.strokes;
                        redraw(slots[saved.id]);
                    }
                }

                // Restore character input
                if (data.char) {
                    document.getElementById('charInput').value = data.char;
                }

                updateTotalCount();
                document.getElementById('status').innerText = "Sitzung wiederhergestellt";
                return true;
            } catch (e) {
                return false;
            }
        }

        function clearAutoSave() {
            try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        }

        function saveAndReset() {
            const rawChar = document.getElementById('charInput').value;
            // Allow Spaces to be saved as "Space"
            if (rawChar.length === 0 && rawChar !== ' ') {
                alert("Bitte ein Zeichen eingeben!");
                return;
            }

            const activeVariants = slots.filter(s => s.strokes.length > 0).map(s => ({
                id: s.id,
                strokes: s.strokes
            }));

            if (activeVariants.length === 0) {
                document.getElementById('status').innerText = "Keine Zeichnungen zum Speichern!";
                return;
            }

            const exportData = {
                char: rawChar,
                exported_at: new Date().toISOString(),
                metadata: {
                    font_family: FONT_FAMILY,
                    baseline_y: BASELINE_Y,
                    x_height: X_HEIGHT,
                    canvas_size: [CANVAS_WIDTH, CANVAS_HEIGHT]
                },
                variants: activeVariants
            };

            const safeName = getSafeFilename(rawChar);
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${safeName}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            clearAll(); // Also clears auto-save
            document.getElementById('status').innerText = `Gespeichert: ${safeName}.json`;
            document.getElementById('charInput').value = '';
            document.getElementById('charInput').focus();
        }

        init();
    </script>
</body>

</html>
